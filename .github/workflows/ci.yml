name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No `cache: npm` — this repo is intentionally lockfile-free.

      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-save

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
